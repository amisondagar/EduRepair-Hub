<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduRepair Hub - Authentication</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = { production: true };
    </script>
    <!-- 🎯 FIXED PATH: Points directly to index.css in your root -->
    <link rel="stylesheet" href="index.css">
</head>
<body class="relative min-h-screen w-full flex flex-col items-center justify-center overflow-x-hidden bg-slate-50 py-12">

    <div id="particles-js" class="absolute inset-0 z-0 pointer-events-none"></div>

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[450px] h-[450px] pointer-events-none z-10">
        <div class="absolute top-0 left-0 w-64 h-64 bg-cyan-400 rounded-full mix-blend-multiply filter blur-[60px] opacity-40 animate-pulse"></div>
        <div class="absolute bottom-0 right-0 w-64 h-64 bg-purple-400 rounded-full mix-blend-multiply filter blur-[60px] opacity-40 animate-pulse"></div>
    </div>

    <main class="relative z-20 w-full max-w-md px-4 flex flex-col items-center">
        <div class="flex flex-col items-center mb-8 text-center">
            <div class="flex items-center gap-2 text-3xl font-bold text-slate-800 tracking-tight">
                <span>🛠️</span>
                <span>EduRepair Hub</span>
            </div>
            <p class="text-sm font-medium text-slate-500 mt-2 max-w-[280px]">
                School Facility Condition Reporting & Repair Tracking Portal
            </p>
        </div>

        <div class="w-full rounded-3xl border border-white/40 bg-white/30 p-6 sm:p-8 shadow-2xl backdrop-blur-xl transition-all duration-300">
            
            <!-- PORTAL AREA 1: SIGN IN CARD VIEW -->
            <div id="signInContainer" class="block space-y-6">
                <h1 class="text-2xl font-semibold text-center text-slate-800">Sign In</h1>
                <form id="loginForm" class="space-y-4">
                    <div class="space-y-1">
                        <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider">University Email</label>
                        <input type="email" required id="loginEmail" 
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/60 text-slate-800 outline-none transition-all duration-200 focus:border-cyan-400 focus:bg-white focus:ring-2 focus:ring-cyan-100" 
                            placeholder="username@university.edu">
                    </div>
                    <div class="space-y-1">
                        <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider">Password</label>
                        <input type="password" required id="loginPassword" 
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/60 text-slate-800 outline-none transition-all duration-200 focus:border-purple-400 focus:bg-white focus:ring-2 focus:ring-purple-100" 
                            placeholder="••••••••">
                    </div>
                    <button type="submit" class="w-full py-3 mt-2 rounded-xl bg-gradient-to-r from-cyan-500 to-purple-600 text-white font-medium tracking-wide shadow-lg shadow-purple-200 transition-all duration-200 hover:opacity-95 active:scale-[0.99]">
                        Access Portal
                    </button>
                </form>
                <p class="text-xs text-center text-slate-500 font-medium">
                    New to the portal? <button id="switchToSignUp" class="text-cyan-600 hover:underline outline-none font-semibold">Create an account</button>
                </p>
            </div>

            <!-- PORTAL AREA 2: SIGN UP CARD VIEW -->
            <div id="signUpContainer" class="hidden space-y-6">
                <h1 class="text-2xl font-semibold text-center text-slate-800">Create Account</h1>
                <form id="registerForm" class="space-y-4">
                    <div class="space-y-1">
                        <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider">Full Name</label>
                        <input type="text" required id="regName" 
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/60 text-slate-800 outline-none transition-all duration-200 focus:border-cyan-400 focus:bg-white focus:ring-2 focus:ring-cyan-100" 
                            placeholder="Your Name">
                    </div>
                    <div class="space-y-1">
                        <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider">University Email</label>
                        <input type="email" required id="regEmail" 
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/60 text-slate-800 outline-none transition-all duration-200 focus:border-cyan-400 focus:bg-white focus:ring-2 focus:ring-cyan-100" 
                            placeholder="username@university.edu">
                    </div>
                    
                    <div class="space-y-1">
                        <label for="regRole" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider">Account Role</label>
                        <select id="regRole" name="accountRole" title="Select your account role" 
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/60 text-slate-800 outline-none transition-all duration-200 focus:border-cyan-400 focus:bg-white focus:ring-2 focus:ring-cyan-100 cursor-pointer">
                            <option value="student">Student / Campus Staff</option>
                            <option value="admin">Maintenance Administration</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider">Create Password</label>
                        <input type="password" required id="regPassword" 
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white/60 text-slate-800 outline-none transition-all duration-200 focus:border-purple-400 focus:bg-white focus:ring-2 focus:ring-purple-100" 
                            placeholder="Minimum 6 characters">
                    </div>
                    <button type="submit" class="w-full py-3 mt-2 rounded-xl bg-gradient-to-r from-purple-600 to-cyan-500 text-white font-medium tracking-wide shadow-lg shadow-cyan-200 transition-all duration-200 hover:opacity-95 active:scale-[0.99]">
                        Register Account
                    </button>
                </form>
                <p class="text-xs text-center text-slate-500 font-medium">
                    Already registered? <button id="switchToSignIn" class="text-purple-600 hover:underline outline-none font-semibold">Sign back in</button>
                </p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <!-- 🎯 FIXED PATHS: Flat root locations -->
    <script src="particles-config.js"></script>
    <script type="module" src="auth.js"></script>
</body>
</html>
